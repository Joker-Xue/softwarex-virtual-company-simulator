services:
  db:
    image: postgres:15-alpine
    container_name: vcsim-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-career_planner}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-career_planner_2026}
      POSTGRES_DB: ${DB_NAME:-career_planner}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: vcsim-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vcsim-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-career_planner}:${DB_PASSWORD:-career_planner_2026}@db:5432/${DB_NAME:-career_planner}
      REDIS_URL: redis://redis:6379/0
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5174,http://127.0.0.1:5174}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ENCRYPTION_KEY_V1: ${ENCRYPTION_KEY_V1:-}
      TIANAPI_KEY: ${TIANAPI_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_DISPLAY_NAME: ${SMTP_DISPLAY_NAME:-Virtual Company Simulator}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-true}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: vcsim-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5174:5174"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5174').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  pgdata:
  redisdata:
